services:
  - type: web
    name: new-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/status
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: ERROR_LOG_ENABLED
        value: "true"
      - key: BATCH_UPDATE_ENABLED
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: SQL_DSN
        fromDatabase:
          name: new-api-db
          property: connectionString

databases:
  - name: new-api-db
    plan: free
    databaseName: new_api
    ipAllowList: []
